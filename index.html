<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <meta name="description" content="To-Do List" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo-container">
      <button id="darktheme">⏾</button>
      <h1 id="main-title">รายการสิ่งที่ต้องทำ</h1>
      <div class="wrapper">
        <div id="search-con">
          <input
            type="search"
            id="search-input"
            placeholder="Search list name here..."
          />
          <button id="search">Search</button>
        </div>
      </div>
      <div class="search-box"></div>
      <div class="input-section">
        <input type="text" id="todo-input" placeholder="เพิ่มกิจกรรมใหม่..." />
        <input type="datetime-local" id="end-date" title="วันสิ้นสุด" />
        <button id="add-btn">+</button>
      </div>

      <ul id="todo-list"></ul>
      
    </div>
    <script src="script.js"></script>
  </body>
</html>
